<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trạm 3: Xưởng Đo Lường - Robo Phẩy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fcd34d 100%);
            user-select: none; 
            overflow: hidden; /* Cố định 100% màn hình, không trượt toàn trang */
            -webkit-tap-highlight-color: transparent;
        }

        /* Animations */
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: floating 2.5s ease-in-out infinite; }
        
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 10s linear infinite; }

        @keyframes conveyor { 100% { background-position: 50px 0; } }
        .conveyor-belt { 
            background-image: repeating-linear-gradient(90deg, #475569 0px, #475569 25px, #334155 25px, #334155 50px);
            animation: conveyor 1.5s linear infinite; 
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
        .shake-error { animation: shake 0.4s; border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #ef4444 !important;}

        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Nút bấm Game (Giao diện cũ) */
        .btn-game { 
            @apply font-black rounded-xl md:rounded-2xl transition-all duration-150 flex items-center justify-center text-center active:translate-y-1 md:active:translate-y-2 disabled:opacity-50 disabled:cursor-not-allowed; 
        }
        .btn-primary { @apply bg-amber-500 hover:bg-amber-400 text-white shadow-[0_4px_0_#b45309] md:shadow-[0_6px_0_#b45309] active:shadow-[0_0px_0_#b45309] border-2 border-amber-300; }
        .btn-success { @apply bg-green-500 hover:bg-green-400 text-white shadow-[0_4px_0_#16a34a] md:shadow-[0_6px_0_#16a34a] active:shadow-[0_0px_0_#16a34a] border-2 border-green-300; }
        .btn-secondary { @apply bg-gray-100 hover:bg-white text-gray-700 shadow-[0_4px_0_#9ca3af] md:shadow-[0_6px_0_#9ca3af] active:shadow-[0_0px_0_#9ca3af] border-2 border-gray-300; }
        .btn-warning { @apply bg-orange-100 hover:bg-orange-200 text-orange-600 shadow-[0_4px_0_#c2410c] md:shadow-[0_6px_0_#c2410c] active:shadow-[0_0px_0_#c2410c] border-2 border-orange-300; }

        /* Panels (Giao diện cũ) */
        .game-panel { @apply bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl border-b-[6px] md:border-b-[8px] border-amber-200 border-x-2 border-t-2; }
        .game-card { @apply bg-white rounded-xl shadow-md border-b-4 border-gray-200 border-x-2 border-t-2; }

        /* Speech Bubble */
        .speech-bubble { 
            position: relative; background: white; border-radius: 1.5rem; border: 4px solid #f59e0b;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .speech-bubble:after, .speech-bubble:before { 
            content: ''; position: absolute; bottom: -24px; left: 20%; border: solid transparent; height: 0; width: 0; 
        }
        .speech-bubble:after { border-top-color: white; border-width: 15px; margin-left: -15px; bottom: -20px;}
        .speech-bubble:before { border-top-color: #f59e0b; border-width: 20px; margin-left: -20px; }

        /* Drag Drop */
        .drag-card { cursor: grab; transition: all 0.2s; z-index: 10; touch-action: manipulation;}
        .drag-card:active { cursor: grabbing; transform: scale(1.1) rotate(2deg); }
        .drag-card.selected { @apply ring-4 ring-blue-500 scale-110 shadow-xl rotate-[-2deg]; }
        .drop-zone { transition: all 0.3s; touch-action: manipulation; cursor: pointer; border-style: dashed; }
        .drop-zone.drag-over { background-color: #fef08a; border-color: #eab308; transform: scale(1.05); border-style: solid; box-shadow: 0 0 15px rgba(234, 179, 8, 0.5); }

        /* Unit Table */
        .unit-cell { @apply border-b-4 border-r-2 border-t-2 border-l-2 border-amber-200 text-center font-black p-1 md:p-2 text-2xl md:text-3xl bg-white transition-all duration-300 rounded-lg mx-1; }
        .unit-header { @apply bg-gradient-to-b from-amber-100 to-amber-200 text-amber-800 border-b-4 border-amber-400 border-x-2 border-t-2 font-black py-2 md:py-3 text-center text-sm md:text-lg rounded-xl mb-2 mx-1 shadow-sm; }
        .highlight-col { @apply bg-yellow-200 border-yellow-500 text-yellow-900 scale-110 shadow-lg z-10; transform: translateY(-5px);}
        
        /* Bảng Phản Hồi */
        .feedback-box { @apply p-2 md:p-3 rounded-xl font-bold text-center text-xs md:text-base border-2 shadow-sm animate-pop flex items-center justify-center min-h-[3rem] w-full; }
        .fb-success { @apply bg-green-100 text-green-700 border-green-400; }
        .fb-error { @apply bg-red-100 text-red-700 border-red-400; }
        .fb-hint { @apply bg-blue-100 text-blue-700 border-blue-400; }
        .fb-empty { @apply bg-gray-50 border-gray-200 text-gray-400 border-dashed; }

        /* Thanh cuộn dành riêng cho Game Content */
        #app-container::-webkit-scrollbar { width: 6px; }
        #app-container::-webkit-scrollbar-track { background: transparent; }
        #app-container::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    </style>
</head>

    <script>
        // --- DATA & STATE ---
        const APP_ID = 'robo_phay_tram3_v1';
        let isAudioEnabled = true;
        let currentScreenIndex = 0;
        let currentStageErrors = 0;
        let clickCountForTeacher = 0, teacherTimer = null;
        let currentHintText = "";
        let sessionStartTime = null;
        
        let gcpApiKey = null, currentAudio = null;
        const ENCRYPTED_PAYLOAD = "YWRtaW58QUl6YVN5Q0hrZElrYy10WklZUGx5emdQTFZ3bXZSSk91T2toeWVF";

        let sessionData = { score: 0, correctAnswers: 0, wrongAnswers: 0, errorsLogged: [], timeSpent: 0 };
        let globalSpeechId = 0; 
        let appTimeouts = [];

        function safeSetTimeout(fn, delay) { const id = setTimeout(fn, delay); appTimeouts.push(id); return id; }
        function clearAppTimeouts() { appTimeouts.forEach(id => clearTimeout(id)); appTimeouts = []; }

        function stopAllAudio() {
            globalSpeechId++; 
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        let audioCtx = null;
        function playSFX(type) {
            if (!isAudioEnabled) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                if (type === 'correct') { 
                    osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.1); osc.frequency.setValueAtTime(1000, now + 0.2); 
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'wrong') { 
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'click') { 
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1);
                }
            } catch (e) { console.warn("SFX Error:", e); }
        }

        const SCREENS = [
            { id: 'intro', type: 'intro' },
            { id: 'stairs', type: 'stairs' }, 
            { 
                id: 'table_1', type: 'table', 
                pool: [
                    { q: "2m 15cm", tar: "m", unitSys: "length", steps: ["2", "1", "5", ""], ans: "2,15", hint: "Số 2 ở m. 15 rải ra dm và cm. Phẩy ở m!" },
                    { q: "5m 8cm", tar: "m", unitSys: "length", steps: ["5", "0", "8", ""], ans: "5,08", hint: "Điền 0 vào dm bị khuyết. Phẩy ở m." }
                ]
            },
            { 
                id: 'table_2', type: 'table', 
                pool: [
                    { q: "1kg 250g", tar: "kg", unitSys: "mass", steps: ["1", "2", "5", "0"], ans: "1,25", hint: "Phẩy ở kg. Số 0 cuối cùng bỏ đi nhé!" },
                    { q: "3kg 5g", tar: "kg", unitSys: "mass", steps: ["3", "0", "0", "5"], ans: "3,005", hint: "Khuyết hg và dag! Bù hai số 0. Phẩy ở kg." }
                ]
            },
            { 
                id: 'drag_1', type: 'drag', 
                pool: [
                    { boxes: [{q:"165cm", ans:"1,65 m"}, {q:"275g", ans:"0,275 kg"}, {q:"125m", ans:"0,125 km"}], trucks: ["0,125 km", "1,65 m", "0,275 kg"] },
                    { boxes: [{q:"205cm", ans:"2,05 m"}, {q:"45g", ans:"0,045 kg"}, {q:"350m", ans:"0,35 km"}], trucks: ["0,35 km", "2,05 m", "0,045 kg"] }
                ]
            },
            { 
                id: 'real_1', type: 'real', bg:"bg-orange-50",
                pool: [
                    { context: "Gói hàng nặng 3kg 5g.", q: "Nhập đúng số kg để tính tiền ship:", ans: "3,005", trap: "3,5" },
                    { context: "Gói quà nặng 5kg 50g.", q: "Nhập số thập phân (đơn vị kg):", ans: "5,05", trap: "5,5" }
                ]
            },
            { 
                id: 'speed_1', type: 'speed', 
                pool: [
                    { q: "Cảnh báo khẩn! Đổi 132mm ra mét (m)?", opts: ["1,32 m", "0,132 m", "13,2 m"], ans: 1, trapIdx: 0 },
                    { q: "Hệ thống lỗi! Đổi 9g ra ki-lô-gam (kg)?", opts: ["0,9 kg", "0,09 kg", "0,009 kg"], ans: 2, trapIdx: 0 }
                ]
            },
            { id: 'summary', type: 'summary' }
        ];

        function showApiError(msg) {
            const banner = document.getElementById('api-error-banner');
            banner.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2 text-yellow-300"></i> Google API Lỗi: ${msg}`;
            banner.classList.remove('hidden');
            safeSetTimeout(() => banner.classList.add('hidden'), 5000);
        }

        async function speakText(text) {
            currentHintText = text;
            if (!isAudioEnabled) return;

            stopAllAudio(); 
            const currentSpeechId = globalSpeechId;

            const unitMap = { 'km': 'ki lô mét', 'hm': 'héc tô mét', 'dam': 'đề ca mét', 'm': 'mét', 'dm': 'đề xi mét', 'cm': 'xăng ti mét', 'mm': 'mi li mét', 'kg': 'ki lô gam', 'hg': 'héc tô gam', 'dag': 'đề ca gam', 'g': 'gam' };
            const unitRegex = new RegExp(`(^|[\\s\\d])(${Object.keys(unitMap).sort((a,b)=>b.length-a.length).join('|')})(?=[^\\p{L}]|$)`, 'giu');

            let pText = text.replace(/(\d),(\d)/g, '$1 phẩy $2').replace(/>/g, ' lớn hơn ').replace(/</g, ' bé hơn ').replace(/=/g, ' bằng ').replace(/Tít tít!/g, '').replace(/Bíp bíp!/g, '').replace(/Úi da!/g, 'Ối!').replace(/Étttt!/g, 'Á!');
            pText = pText.replace(unitRegex, (match, p1, p2) => p1 + ' ' + unitMap[p2.toLowerCase()] + ' ');

            let useFallback = true; 

            if (gcpApiKey) {
                try {
                    const res = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${gcpApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ input: { text: pText }, voice: { languageCode: 'vi-VN', name: 'vi-VN-Wavenet-A' }, audioConfig: { audioEncoding: 'MP3', speakingRate: 1.0 } })
                    });
                    
                    if (currentSpeechId !== globalSpeechId) return; 

                    if (res.ok) { 
                        const d = await res.json(); 
                        currentAudio = new Audio("data:audio/mp3;base64," + d.audioContent); 
                        currentAudio.play().catch(e => console.warn("Autoplay chặn", e)); 
                        useFallback = false; 
                    } else {
                        const errData = await res.json();
                        if(currentSpeechId === globalSpeechId) showApiError(errData.error?.message || "Từ chối API");
                        gcpApiKey = null; 
                    }
                } catch (e) { gcpApiKey = null; }
            }
            
            if (useFallback && 'speechSynthesis' in window) {
                if (currentSpeechId !== globalSpeechId) return; 
                const msg = new SpeechSynthesisUtterance(pText); 
                msg.lang = 'vi-VN'; msg.rate = 1.0; msg.pitch = 1.0;
                const voices = window.speechSynthesis.getVoices();
                const viVoice = voices.find(v => v.lang === 'vi-VN' || v.lang === 'vi_VN' || v.lang === 'vi' || v.name.toLowerCase().includes('vietnamese'));
                if(viVoice) msg.voice = viVoice;
                window.speechSynthesis.speak(msg);
            }
        }
        
        function toggleGlobalAudio() {
            isAudioEnabled = !isAudioEnabled;
            document.getElementById('audio-icon').className = isAudioEnabled ? 'fa-solid fa-volume-high text-sm md:text-xl text-amber-500' : 'fa-solid fa-volume-xmark text-sm md:text-xl text-gray-400';
            if(!isAudioEnabled) stopAllAudio(); else speakText("Đã bật âm thanh!");
        }
        function playCurrentHint() { if(currentHintText) speakText(currentHintText); }

        function showNextBtn(hideId) { 
            if(hideId) {

            sessionStartTime = new Date();
            loadTeacherData(); renderScreen();

        function goHome() {
            playSFX('click');
            if(confirm("Trở về Màn hình chính?\nTiến trình chơi hiện tại sẽ bị xóa.")) {
                sessionData = { score: 0, correctAnswers: 0, wrongAnswers: 0, errorsLogged: [], timeSpent: 0 };
                sessionStartTime = new Date();
                currentScreenIndex = 0; currentStageErrors = 0;
                stopAllAudio(); clearAppTimeouts(); renderScreen();
            }
        }

        function skipStage() {
            playSFX('click');
            sessionData.errorsLogged.push({ stage: SCREENS[currentScreenIndex].id, errorType: 'skipped', detail: 'Học sinh bỏ qua vòng này', time: new Date().toISOString() });
            nextScreen();
        }

        function nextScreen() { 
            playSFX('click'); currentStageErrors = 0; 
            stopAllAudio(); clearAppTimeouts();
            if (currentScreenIndex < SCREENS.length - 1) { currentScreenIndex++; renderScreen(); } 
        }

        function prevScreen() { 
            playSFX('click');
            if (currentScreenIndex > 0) { 
                currentScreenIndex--; currentStageErrors = 0; 
                stopAllAudio(); clearAppTimeouts(); renderScreen(); 
            } 
        }

        function renderScreen() {
            const container = document.getElementById('app-container');
            const screenData = SCREENS[currentScreenIndex];
            container.innerHTML = ''; container.scrollTop = 0;
            
            if (screenData.pool && !screenData.currentData) {
                screenData.currentData = screenData.pool[Math.floor(Math.random() * screenData.pool.length)];
            }
            const activeData = screenData.currentData || screenData.data || {};
            if (screenData.bg) activeData.bg = screenData.bg;
            
            if(screenData.type === 'intro') renderIntro(container);
            else if(screenData.type === 'stairs') renderStairs(container);
            else if(screenData.type === 'table') renderTable(container, activeData);
            else if(screenData.type === 'drag') renderDrag(container, activeData);
            else if(screenData.type === 'real') renderReal(container, activeData);
            else if(screenData.type === 'speed') renderSpeed(container, activeData);
            else if(screenData.type === 'summary') renderSummary(container);
        }

        function simulateTable(sys, stepsStr, tar) {
            const btn = document.getElementById('btn-sim');
            if (btn.disabled) return; 
            playSFX('click');
            const steps = stepsStr.split(',');
            const cells = sys === "length" ? ['m', 'dm', 'cm', 'mm'] : ['kg', 'hg', 'dag', 'g'];
            cells.forEach(c => { document.getElementById('cell-'+c).innerText = ''; document.getElementById('cell-'+c).classList.remove('highlight-col'); });
            let timeOffset = 200;
            steps.forEach((val, index) => {
                if(val !== "") {
                    safeSetTimeout(() => { 
                        playSFX('click'); document.getElementById('cell-'+cells[index]).innerText = val; 
                    }, timeOffset);
                    timeOffset += 300;
                }
            });
            safeSetTimeout(()=>{
                playSFX('correct');
                const targetCell = sys === 'length' ? 'm' : 'kg';
                document.getElementById('cell-'+targetCell).classList.add('highlight-col');
                speakText("Chú ý cột màu vàng nhé! Dấu phẩy đặt ở đó!");
            }, timeOffset + 100);
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-check text-green-600 mr-2"></i> Đã nạp mẫu';
        }

        function chkTable(ans, hint) {
            const val = document.getElementById('t-input').value.trim();
            const inputEl = document.getElementById('t-input');
            const fbContainer = document.getElementById('t-fb');
            fbContainer.classList.remove('hidden');

            if(!val) {
                inputEl.focus(); inputEl.classList.add('shake-error'); safeSetTimeout(()=>inputEl.classList.remove('shake-error'),500);
                playSFX('wrong'); setFeedback('t-fb', 'error', 'Giấy nhãn đang trống trơn kìa!');
                return speakText("Giấy nhãn đang trống trơn kìa!");
            }

            if(parseFloat(val.replace(',','.')) === parseFloat(ans.replace(',','.'))) {
                playSFX('correct'); inputEl.classList.add('bg-green-50', 'border-green-400', 'text-green-700');
                setFeedback('t-fb', 'success', '<i class="fa-solid fa-star text-yellow-500 mr-2"></i> Dấu phẩy đặt chuẩn!');
                sessionData.score+=10; showNextBtn('btn-chk');
                speakText("Tuyệt cú mèo! Dấu phẩy đặt chuẩn!");
            } else {
                playSFX('wrong'); currentStageErrors++; sessionData.wrongAnswers++;
                inputEl.classList.add('shake-error'); safeSetTimeout(()=>inputEl.classList.remove('shake-error'),500);
                
                if(currentStageErrors === 1) {
                    setFeedback('t-fb', 'error', 'Sai rồi. Bấm [Xem Mẫu] đi!');
                    speakText("Sai rồi. Thử xem tớ làm mẫu nhé!");
                } else if(currentStageErrors === 2) {
                    setFeedback('t-fb', 'hint', `<strong>Gợi ý:</strong> ${hint}`);
                    speakText("Gợi ý mật cho cậu: " + hint);
                    logError('table', 'comma_placement', 'Sai dấu phẩy');
                } else {
                    setFeedback('t-fb', 'error', `Đáp án đúng là <strong class="text-lg ml-1">${ans}</strong>.`);
                    speakText(`Hệ thống bốc hỏa! Đáp án phải là ${ans}.`);
                    inputEl.value = ans; showNextBtn('btn-chk');
                }
            }
            saveTeacherData();
        }

                        <button id="btn-chk" class="btn-game btn-primary flex-[2] py-2 md:py-3 text-sm md:text-xl" onclick="chkDragPack()">Xuất Hàng <i class="fa-solid fa-truck-fast ml-1"></i></button>

            let dragged = null; selectedDragBox = null;
            document.querySelectorAll('.drag-card').forEach(el => {
                el.ondragstart = function(e){ dragged = this; e.dataTransfer.setData('text/plain', ''); playSFX('click'); safeSetTimeout(()=>this.style.opacity='0.5',0); };
                el.ondragend = function(){ this.style.opacity='1'; dragged=null; };
                el.onclick = function(e) {
                    e.stopPropagation();
                    if(selectedDragBox === this) { this.classList.remove('selected'); selectedDragBox = null; return; }
                    if(selectedDragBox) selectedDragBox.classList.remove('selected');
                    selectedDragBox = this; this.classList.add('selected'); playSFX('click');
                    if(this.parentNode.classList.contains('drop-zone')) { document.getElementById('box-dock').appendChild(this); this.classList.remove('selected'); selectedDragBox = null; }
                };
            });
            document.querySelectorAll('.drop-zone').forEach(z => {
                z.ondragover = e => { e.preventDefault(); z.classList.add('drag-over'); };

        function handleDropToZone(box, zone) {
            const existingBox = zone.querySelector('.drag-card');
            if(existingBox) document.getElementById('box-dock').appendChild(existingBox);
            zone.appendChild(box); playSFX('click');
            const arrow = zone.querySelector('.fa-arrow-down');
            if(arrow) arrow.style.display = 'none';
        }

        function chkDragPack() {
            let ok = true, placedCount = 0;
            const totalBoxes = document.querySelectorAll('.drag-card').length;
            document.querySelectorAll('.drop-zone').forEach(z => {
                const box = z.querySelector('.drag-card');
                if(box) { placedCount++; if(box.dataset.ans !== z.dataset.t) ok = false; } 
            });

            const fbContainer = document.getElementById('d-fb'); fbContainer.classList.remove('hidden');
            if(placedCount < totalBoxes) {
                setFeedback('d-fb', 'error', 'Vẫn còn thùng hàng chưa lên xe kìa!');
                playSFX('wrong'); return speakText("Vẫn còn thùng hàng ở khu vực chờ kìa!");
            }
            if(ok) {
                playSFX('correct'); setFeedback('d-fb', 'success', '<i class="fa-solid fa-truck-fast text-xl mr-2 animate-bounce"></i> Xe đã xuất phát!');
                sessionData.score+=15; showNextBtn('btn-chk');
                document.querySelectorAll('.drag-card').forEach(el => { el.draggable = false; el.onclick = null; el.classList.add('cursor-default', 'opacity-80'); });
                document.querySelectorAll('.drop-zone').forEach(z => z.onclick = null);
                speakText("Còi xe vang lên! Hàng đi đúng chuyến rồi.");
            } else {
                playSFX('wrong'); currentStageErrors++; sessionData.wrongAnswers++;
                setFeedback('d-fb', 'error', '<i class="fa-solid fa-triangle-exclamation mr-2"></i> Có thùng lên nhầm xe, đổi lại mau!');
                speakText("Étttt! Có thùng lên nhầm xe rồi!"); logError('drag_pack', 'unit_conversion', 'Xếp nhầm xe tải');

        }

                    </div>
                    
                    <div class="flex flex-col md:flex-row gap-6 md:gap-8 items-center justify-center flex-1 w-full">

        function chkReal(ans, trap) {
            const val = document.getElementById('r-input').value.trim();
            const inputEl = document.getElementById('r-input');
            const fbContainer = document.getElementById('r-fb');
            fbContainer.classList.remove('hidden');

            if(!val) {
                inputEl.focus(); playSFX('wrong'); setFeedback('r-fb', 'error', 'Chưa nhập số liệu!');
                return speakText("Chưa nhập số liệu! Cậu định miễn phí cho khách à?");
            }

            if(val === ans) {
                playSFX('correct'); inputEl.classList.add('bg-green-50', 'border-green-400', 'text-green-700');
                setFeedback('r-fb', 'success', '<i class="fa-solid fa-receipt text-xl mr-2"></i> Hóa đơn chuẩn xác!');
                sessionData.score+=15; showNextBtn('btn-chk'); speakText("Hóa đơn in ra chuẩn xác!");
            } else {
                playSFX('wrong'); currentStageErrors++; sessionData.wrongAnswers++;
                inputEl.classList.add('shake-error'); safeSetTimeout(()=>inputEl.classList.remove('shake-error'),500);
                if(val === trap) {
                    setFeedback('r-fb', 'error', `Suýt sập bẫy! Phần dư nhỏ phải nằm ở phần nghìn nhé!`);
                    speakText("Suýt sập bẫy! Nhớ này: 1 ki lô gam bằng 1000 gam.");
                    logError('real', 'missed_zeros', `Bẫy -> ${trap}`);
                } else if (currentStageErrors === 1) {
                    setFeedback('r-fb', 'error', 'Cái cân khóc ròng rùi 😭. Nhẩm lại bảng đơn vị đi!');
                    speakText("Cậu nhẩm lại các cột đơn vị xem nào!");
                } else {
                    setFeedback('r-fb', 'hint', `<strong>Phao cứu sinh:</strong> Đáp án là <strong class="text-lg text-orange-600">${ans}</strong>.`);
                    speakText(`Đáp án đúng là ${ans}.`); inputEl.value = ans; showNextBtn('btn-chk');
                }
            }
            saveTeacherData();
        }

        function renderSpeed(c, d) {

            safeSetTimeout(()=>speakText("Cảnh báo! Boss cuối xuất hiện! Nó lừa đảo lắm. Đọc kĩ đề nha!"), 500);
        }

        function chkSpeed(sel, ans, trap, btn) {
            const fbContainer = document.getElementById('sp-fb');
            fbContainer.classList.remove('hidden');

            if(sel === ans) {
                playSFX('correct'); 
                btn.classList.remove('border-indigo-200', 'hover:border-indigo-400', 'hover:bg-indigo-50'); 
                btn.classList.add('bg-green-400', 'text-white', 'border-green-600');
                document.querySelectorAll('#sp-opts button').forEach(b => { if (b !== btn) b.classList.add('opacity-30', 'pointer-events-none'); });
                
                setFeedback('sp-fb', 'success', '<i class="fa-solid fa-trophy mr-2 text-yellow-500 text-xl"></i> Boss đã bị tiêu diệt!');
                sessionData.score+=20; document.getElementById('sp-opts').classList.add('pointer-events-none'); 
                showNextBtn('btn-skip'); speakText("BÙM! Đánh bại Boss xuất sắc!");
            } else {
                playSFX('wrong'); btn.classList.add('shake-error'); safeSetTimeout(()=>btn.classList.remove('shake-error'),500);
                if(sel === trap) {
                    setFeedback('sp-fb', 'error', 'Ui cha! Đọc kĩ đơn vị cần tìm nha! 🧐');
                    speakText("Bị lừa rồi! Đề bài hỏi đơn vị khác cơ mà."); logError('speed', 'wrong_target_unit', 'Sập bẫy');
                } else {
                    setFeedback('sp-fb', 'error', 'Trượt rồi! Nhẩm lại bảng đơn vị nhé!');
                    speakText("Trượt rồi! Lùi lộn số dấu phẩy rồi.");
                }
            }
            saveTeacherData();
        }

        function renderSummary(c) {
            playSFX('correct'); 
            const timeDiff = Math.floor((new Date() - sessionStartTime) / 1000); sessionData.timeSpent += timeDiff;
            const min = Math.floor(sessionData.timeSpent / 60); const sec = sessionData.timeSpent % 60;
            
            // XỬ LÝ LỖI LOGIC: BỎ QUA KHÔNG ĐƯỢC 10/10 NỮA
            let h = ""; 
            const e = sessionData.errorsLogged.map(x=>x.errorType);
            const skipCount = e.filter(type => type === 'skipped').length;
            
            if(e.includes('comma_placement')) h+="<li class='bg-yellow-50 p-2 md:p-3 rounded-lg border border-yellow-200 text-xs md:text-sm'><i class='fa-solid fa-pen-ruler text-amber-500 mr-2'></i> Kẻ bảng đơn vị ra nháp để đặt phẩy.</li>";
            if(e.includes('missed_zeros')) h+="<li class='bg-yellow-50 p-2 md:p-3 rounded-lg border border-yellow-200 text-xs md:text-sm'><i class='fa-solid fa-0 text-amber-500 mr-2'></i> Nhớ bù số 0 vào cột trống.</li>";
            if(e.includes('wrong_target_unit')) h+="<li class='bg-yellow-50 p-2 md:p-3 rounded-lg border border-yellow-200 text-xs md:text-sm'><i class='fa-solid fa-glasses text-amber-500 mr-2'></i> Đọc kĩ đề bắt đổi ra đơn vị gì nha.</li>";
            
            if(skipCount > 0) {
                h += `<li class='bg-gray-100 p-2 md:p-3 rounded-lg border border-gray-300 text-gray-600 text-xs md:text-sm'><i class='fa-solid fa-forward-step mr-2'></i> Bỏ qua ${skipCount} thử thách. Lần sau dũng cảm lên nhé!</li>`;
            }

            // Điểm hoàn hảo
            if(!h && sessionData.score > 0) {
                h="<li class='bg-green-50 p-3 rounded-lg border border-green-200 text-green-700 font-black text-center text-sm md:text-base'><i class='fa-solid fa-star text-green-500 mr-2 text-xl'></i> 10/10! Cậu không có điểm yếu nào cả!</li>";
            } else if (!h && sessionData.score === 0) {
                h="<li class='bg-gray-50 p-3 rounded-lg border border-gray-200 text-gray-500 font-bold text-center text-sm md:text-base'>Chưa hoàn thành thử thách nào! Lần sau cố lên!</li>";
            }

            c.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 bg-gradient-to-b from-green-300 to-green-600 h-full relative overflow-y-auto">
                    <div class="absolute inset-0 pointer-events-none opacity-30 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+PHBvbHlnb24gcG9pbnRzPSIyNSwwIDI5LDE0IDQ0LDE0IDMyLDIzIDM3LDM4IDI1LDI4IDEzLDM4IDE4LDIzIDYsMTQgMjEsMTQiIGZpbGw9IiNGRkQiLz48L3N2Zz4=')]"></div>

                    <div class="bg-white px-6 py-2 rounded-full mb-6 shadow-lg z-10 animate-bounce mt-4 md:mt-0 shrink-0">
                        <h1 class="text-xl md:text-3xl font-black text-green-600 uppercase tracking-widest text-center">TỐT NGHIỆP! 🎉</h1>
                    </div>

                    <div class="game-panel w-full max-w-sm md:max-w-md p-4 md:p-6 relative z-10 border-green-300 shrink-0">
                        <div class="absolute -top-8 left-1/2 transform -translate-x-1/2 w-16 h-16 bg-yellow-400 rounded-full border-4 border-white flex items-center justify-center shadow-xl z-20"><i class="fa-solid fa-medal text-3xl text-white"></i></div>

                        <div class="grid grid-cols-2 gap-3 mt-6 mb-4">
                            <div class="bg-gradient-to-b from-amber-50 to-amber-100 p-3 rounded-xl text-center border-b-2 border-amber-300 shadow-sm">
                                <p class="text-amber-800 font-black mb-1 text-[10px] md:text-xs uppercase">Điểm Số</p>

                            </div>
                            <div class="bg-gradient-to-b from-blue-50 to-blue-100 p-3 rounded-xl text-center border-b-2 border-blue-300 shadow-sm">
                                <p class="text-blue-800 font-black mb-1 text-[10px] md:text-xs uppercase">Thời Gian</p>
                                <p class="text-2xl font-black text-blue-500 drop-shadow mt-1">${min}<span class="text-sm">p</span> ${sec}<span class="text-sm">s</span></p>
                            </div>
                        </div>

                        <div class="bg-gray-50 rounded-xl p-3 border-2 border-dashed border-gray-300">
                            <h3 class="font-black text-gray-800 text-sm mb-2 flex items-center"><i class="fa-solid fa-comment-dots text-indigo-500 text-lg mr-2"></i> Lời phê:</h3>
                            <ul class="list-none space-y-2 font-semibold text-gray-700">${h}</ul>
                        </div>
                    </div>

                    <button class="mt-6 mb-2 btn-game btn-success text-sm md:text-lg py-3 px-8 shadow-[0_6px_0_#16a34a] hover:-translate-y-1 active:translate-y-1 z-10 animate-pop shrink-0" onclick="location.reload()">
                        <i class="fa-solid fa-rotate-right mr-2"></i> Chơi Lại Cày Điểm!
                    </button>
                </div>`;
            speakText(`Giấy chứng nhận tốt nghiệp xưởng đã được in! Cậu đạt ${sessionData.score} điểm.`);
            saveTeacherData();
        }

        // --- TM & Storage ---
        function logError(stg, type, det) { sessionData.errorsLogged.push({ stage: stg, errorType: type, detail: det, time: new Date().toISOString() }); }
        function saveTeacherData() { localStorage.setItem(APP_ID + '_cur', JSON.stringify(sessionData)); }
        function loadTeacherData() { if(!localStorage.getItem(APP_ID + '_hist')) localStorage.setItem(APP_ID + '_hist', JSON.stringify([])); }

        function handleTeacherTrigger() {
            clickCountForTeacher++; clearTimeout(teacherTimer); teacherTimer = setTimeout(()=>clickCountForTeacher=0, 2000);
            if(clickCountForTeacher>=5) { clickCountForTeacher=0; playSFX('correct'); openTM(); }
        }
        function openTM() {
            document.getElementById('teacher-modal').classList.remove('hidden');
            const cur = JSON.parse(localStorage.getItem(APP_ID + '_cur') || JSON.stringify(sessionData));
            document.getElementById('tm-avg').innerText = cur.score;
            document.getElementById('tm-time').innerText = Math.floor(cur.timeSpent/60) + 'p';
            document.getElementById('tm-err-unit').innerText = cur.errorsLogged.filter(e=>e.errorType==='wrong_target_unit' || e.errorType==='unit_conversion' || e.errorType==='comma_placement').length;
            document.getElementById('tm-error-list').innerHTML = cur.errorsLogged.map(e=>`<li class="bg-red-50 p-2 rounded-xl border border-red-200 text-xs md:text-sm font-semibold text-red-700"><span class="bg-red-200 text-red-800 px-2 py-1 rounded text-[10px] mr-2 uppercase">${e.stage}</span> ${e.detail}</li>`).join('') || "<li class='text-center text-gray-400 font-bold'>Chưa có lỗi nào!</li>";
        }
        function closeTeacherMode() { document.getElementById('teacher-modal').classList.add('hidden'); playSFX('click');}
        function switchTeacherTab(id) { 
            playSFX('click');
            ['stats','errors','objectives'].forEach(i=>document.getElementById('tab-'+i).classList.add('hidden')); 
            document.getElementById('tab-'+id).classList.remove('hidden'); 
            
            const tabs = document.querySelectorAll('#teacher-modal .overflow-x-auto button');
            tabs.forEach(t => { t.className = "px-4 py-2 md:py-3 font-bold text-gray-500 hover:text-amber-600 hover:bg-gray-50 rounded-t-lg transition-colors text-xs md:text-base"; });
            event.currentTarget.className = "px-4 py-2 md:py-3 font-black text-amber-700 border-b-4 border-amber-500 bg-amber-50 rounded-t-lg transition-colors text-xs md:text-base";
        }
        
        function exportData(type) {
            playSFX('click');
            const cur = JSON.parse(localStorage.getItem(APP_ID + '_cur') || JSON.stringify(sessionData));
            let dataStr = "", mime = "";
            if(type === 'json') {
                dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(cur, null, 2)); mime = "robo_phay_tram3_data.json";
            } else if (type === 'csv') {
                let csv = "Time,Stage,Error Type,Detail\n"; cur.errorsLogged.forEach(e => csv += `${e.time},${e.stage},${e.errorType},"${e.detail}"\n`);
                dataStr = "data:text/csv;charset=utf-8," + encodeURIComponent(csv); mime = "robo_phay_tram3_errors.csv";
            }
            const node = document.createElement('a'); node.setAttribute("href", dataStr); node.setAttribute("download", mime);
            document.body.appendChild(node); node.click(); node.remove();
        }
        function resetData() { 
            playSFX('click');
            if(confirm("Cảnh báo: Xóa sạch sành sanh dữ liệu cày cuốc?")) { 
                localStorage.removeItem(APP_ID + '_hist'); localStorage.removeItem(APP_ID + '_cur'); location.reload(); 
            } 
        }

        function unlockAPI() {
            const p = document.getElementById('api-password').value.trim();
            const decodedString = atob(ENCRYPTED_PAYLOAD);
            if(p === decodedString.split('|')[0]) { 
                playSFX('correct'); 
                gcpApiKey = decodedString.split('|')[1]; 
                document.getElementById('auth-modal').classList.add('hidden'); 
                initApp(); 
            } else { 
                playSFX('wrong'); 
                document.getElementById('api-password').classList.add('shake-error'); 
                safeSetTimeout(()=>document.getElementById('api-password').classList.remove('shake-error'), 500); 
            }
        }
        function skipAuth() { playSFX('click'); document.getElementById('auth-modal').classList.add('hidden'); initApp(); }
        document.getElementById('api-password').onkeypress = e => { if(e.key==='Enter') unlockAPI(); };
        
        if ('speechSynthesis' in window) { window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices(); }
        document.addEventListener('touchmove', function(event) { if (event.scale !== 1) { event.preventDefault(); } }, { passive: false });
    </script>
